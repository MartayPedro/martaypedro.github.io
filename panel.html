<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Panel · Marta & Pedro José</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300..700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: {
            colors: {
                weddingBeige: '#FAF7F2', weddingGreen: '#526B79', weddingBlue: '#526B79',
                weddingGold: '#C5A880', weddingGreenLight: '#E8EFF2', weddingDark: '#253238'
            },
            fontFamily: { serif: ['"Playfair Display"','serif'], sans: ['"Montserrat"','sans-serif'] }
        } } };

        // Misma URL del Apps Script que usa la web.
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKoGs8Nhzgg_ASGrRcqsWUvoTGIBuFhxBZp1WjY-TPQwyUiZbkmSsaZY4OZZWm8zO6/exec";
    </script>
</head>
<body class="bg-weddingBeige font-sans text-weddingDark min-h-screen">

    <!-- Pantalla de acceso -->
    <div id="login" class="min-h-screen flex items-center justify-center px-6">
        <div class="bg-white/70 backdrop-blur-sm border border-weddingGold/20 rounded-3xl p-8 md:p-10 max-w-sm w-full shadow-sm text-center">
            <div class="text-weddingGreen text-3xl mb-4"><i class="fa-solid fa-lock"></i></div>
            <h1 class="font-serif text-2xl text-weddingGreen font-light mb-2">Panel de control</h1>
            <p class="text-xs text-weddingDark/60 font-light mb-6">Marta &amp; Pedro José · 11.10.2026</p>
            <input type="password" id="clave" placeholder="Contraseña" class="w-full bg-white border border-weddingGold/30 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-weddingGreen/30 focus:border-weddingGreen mb-3">
            <p id="login-error" class="hidden text-xs text-red-500 mb-3"></p>
            <button id="login-btn" onclick="entrar()" class="w-full py-3 bg-weddingGreen text-white text-[11px] uppercase tracking-[0.2em] font-medium rounded-xl hover:bg-weddingGold transition disabled:opacity-70">
                <span id="login-btn-text">Entrar</span>
                <span id="login-btn-spin" class="hidden align-[-2px] ml-2 inline-block w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
            </button>
        </div>
    </div>

    <!-- Panel -->
    <div id="panel" class="hidden max-w-6xl mx-auto px-4 md:px-6 py-10">
        <div class="flex items-center justify-between mb-8 flex-wrap gap-3">
            <div>
                <h1 class="font-serif text-3xl text-weddingGreen font-light">Panel de control</h1>
                <p class="text-xs text-weddingDark/60 font-light">Confirmaciones y playlist en tiempo real</p>
            </div>
            <div class="flex gap-2">
                <button onclick="cargar()" class="px-4 py-2 border border-weddingGreen text-weddingGreen rounded-full text-[11px] uppercase tracking-wider font-semibold hover:bg-weddingGreen hover:text-white transition"><i class="fa-solid fa-rotate mr-1"></i> Actualizar</button>
                <button onclick="exportarCSV()" class="px-4 py-2 border border-weddingGold text-weddingGold rounded-full text-[11px] uppercase tracking-wider font-semibold hover:bg-weddingGold hover:text-white transition"><i class="fa-solid fa-download mr-1"></i> CSV</button>
            </div>
        </div>

        <!-- Resumen -->
        <div id="resumen" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-10"></div>

        <!-- RSVP -->
        <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
            <h2 class="font-serif text-xl text-weddingGreen font-light"><i class="fa-solid fa-envelope-open-text text-weddingGold mr-2"></i>Confirmaciones</h2>
            <button onclick="toggleTodas()" id="toggle-todas" class="text-[11px] uppercase tracking-wider text-weddingGreen font-semibold border border-weddingGreen/40 rounded-full px-4 py-1.5 hover:bg-weddingGreen hover:text-white transition"><i class="fa-solid fa-chevron-up mr-1"></i> Colapsar todo</button>
        </div>
        <div id="rsvp-body" class="space-y-3 mb-12"></div>

        <!-- Playlist -->
        <h2 class="font-serif text-xl text-weddingGreen font-light mb-3"><i class="fa-solid fa-music text-weddingGold mr-2"></i>Playlist sugerida</h2>
        <div class="overflow-x-auto bg-white/60 border border-weddingGold/15 rounded-2xl">
            <table class="w-full text-xs text-left">
                <thead class="bg-weddingGreenLight/50 text-weddingGreen uppercase text-[10px] tracking-wider">
                    <tr><th class="px-3 py-3">#</th><th class="px-3 py-3">Título</th><th class="px-3 py-3">Artista</th><th class="px-3 py-3">Propuesta por</th><th class="px-3 py-3 text-center">Votos</th><th class="px-3 py-3"></th></tr>
                </thead>
                <tbody id="playlist-body" class="divide-y divide-weddingGold/10"></tbody>
            </table>
        </div>
        <div class="mt-3 flex flex-wrap items-end gap-2">
            <div><span class="block text-[9px] uppercase tracking-wider text-weddingGreen font-semibold mb-1">Título</span><input id="nueva-titulo" class="bg-white border border-weddingGold/30 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-weddingGreen/30"></div>
            <div><span class="block text-[9px] uppercase tracking-wider text-weddingGreen font-semibold mb-1">Artista</span><input id="nueva-artista" class="bg-white border border-weddingGold/30 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-weddingGreen/30"></div>
            <div><span class="block text-[9px] uppercase tracking-wider text-weddingGreen font-semibold mb-1">Propuesta por</span><input id="nueva-proponente" class="bg-white border border-weddingGold/30 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-weddingGreen/30"></div>
            <button onclick="anadirCancion()" class="text-[11px] uppercase tracking-wider text-white font-semibold bg-weddingGreen rounded-lg px-4 py-2 hover:bg-weddingGreen/90 transition"><i class="fa-solid fa-plus mr-1"></i> Añadir</button>
        </div>

        <p id="estado" class="text-center text-[11px] text-weddingDark/50 mt-8"></p>
    </div>

    <script>
        let DATA = null;

        function entrar() {
            const clave = document.getElementById("clave").value.trim();
            if (!clave) return;
            document.getElementById("login-error").classList.add("hidden");
            cargandoLogin(true);
            sessionStorage.setItem("panelClave", clave);
            cargar(true);
        }

        function cargandoLogin(activo) {
            document.getElementById("login-btn").disabled = activo;
            document.getElementById("login-btn-spin").classList.toggle("hidden", !activo);
            document.getElementById("login-btn-text").textContent = activo ? "Comprobando..." : "Entrar";
        }

        async function cargar(desdeLogin) {
            const clave = sessionStorage.getItem("panelClave");
            if (!clave) return;
            const estado = document.getElementById("estado");
            if (estado) estado.textContent = "Cargando...";
            try {
                const res = await fetch(APPS_SCRIPT_URL + "?panel=" + encodeURIComponent(clave));
                const data = await res.json();
                if (!data.ok) {
                    if (desdeLogin) { cargandoLogin(false); mostrarErrorLogin(data.error || "Clave incorrecta"); }
                    sessionStorage.removeItem("panelClave");
                    return;
                }
                DATA = data;
                if (desdeLogin) cargandoLogin(false);
                document.getElementById("login").classList.add("hidden");
                document.getElementById("panel").classList.remove("hidden");
                pintar(data);
            } catch (err) {
                if (desdeLogin) { cargandoLogin(false); mostrarErrorLogin("No se pudo conectar. Inténtalo de nuevo."); }
                else if (estado) estado.textContent = "Error de conexión.";
            }
        }

        function mostrarErrorLogin(msg) {
            const e = document.getElementById("login-error");
            e.textContent = msg;
            e.classList.remove("hidden");
        }

        function tarjeta(valor, etiqueta, icono, color) {
            return `<div class="bg-white/70 border border-weddingGold/15 rounded-2xl p-4 text-center">
                <div class="${color} text-xl mb-1"><i class="${icono}"></i></div>
                <div class="font-serif text-2xl text-weddingGreen">${valor}</div>
                <div class="text-[9px] uppercase tracking-wider text-weddingDark/60">${etiqueta}</div>
            </div>`;
        }

        // Mapa "comensal -> alergias" a partir del texto guardado.
        function mapaAlergias(str) {
            const m = {};
            String(str || "").split("|").forEach(part => {
                const i = part.indexOf(":");
                if (i > -1) m[part.slice(0, i).trim()] = part.slice(i + 1).trim();
            });
            return m;
        }

        // Lista de personas de una familia (con su tipo).
        function personasFamilia(x) {
            const lista = [{ nombre: x.nombre || "(sin nombre)", tipo: "Adulto" }];
            String(x.acompanantes || "").split(",").map(s => s.trim()).filter(Boolean)
                .forEach(n => lista.push({ nombre: n, tipo: "Adulto" }));
            const nNinos = Number(x.ninos) || 0;
            for (let i = 1; i <= nNinos; i++) lista.push({ nombre: "Niño/a " + i, tipo: "Niño (menú infantil)" });
            const nBebes = Number(x.bebes) || 0;
            for (let i = 1; i <= nBebes; i++) lista.push({ nombre: "Bebé " + i, tipo: "Bebé (trona)" });
            return lista;
        }

        function familiaBloque(x, idx) {
            const asiste = String(x.asiste) === "si";
            const personas = asiste ? personasFamilia(x) : [];
            const alerg = mapaAlergias(x.alergias);
            const total = (Number(x.personas) || 0) + (Number(x.ninos) || 0) + (Number(x.bebes) || 0);

            let filas = personas.map(p => {
                const a = alerg[p.nombre];
                return `<div class="flex items-start gap-3 px-4 py-2 text-xs">
                    <span class="w-2 h-2 mt-1.5 rounded-full ${a ? "bg-red-400" : "bg-weddingGold/40"} flex-shrink-0"></span>
                    <span class="font-semibold text-weddingGreen flex-1 min-w-0">${esc(p.nombre)}</span>
                    <span class="text-weddingDark/50 text-[10px] whitespace-nowrap">${p.tipo}</span>
                    <span class="text-weddingDark/80 flex-1 text-right">${a ? '🍽️ ' + esc(a) : '<span class="text-weddingDark/30">—</span>'}</span>
                </div>`;
            }).join("");

            if (!asiste) {
                filas = `<div class="px-4 py-2 text-xs text-weddingDark/70">No asistirá.${x.comentarios ? " Motivo: " + esc(x.comentarios) : ""}</div>`;
            } else if (x.comentarios) {
                filas += `<div class="px-4 py-2 text-xs text-weddingDark/70 border-t border-weddingGold/10"><i class="fa-solid fa-comment-dots text-weddingGold mr-1"></i> ${esc(x.comentarios)}</div>`;
            }

            return `<div class="bg-white/60 border border-weddingGold/15 rounded-2xl overflow-hidden">
                <div class="w-full flex items-center justify-between px-4 py-3 hover:bg-weddingGreenLight/20 transition">
                    <div class="min-w-0 flex-1 cursor-pointer" onclick="toggleFam(${idx})">
                        <span class="font-serif text-base text-weddingGreen">${esc(x.nombre)}</span>
                        ${asiste
                            ? `<span class="ml-2 text-[10px] text-green-600 font-semibold uppercase tracking-wider">Asiste · ${total} pers.</span>`
                            : `<span class="ml-2 text-[10px] text-red-500 font-semibold uppercase tracking-wider">No asiste</span>`}
                        <span class="block text-[10px] text-weddingDark/40">${esc(x.fecha)}</span>
                    </div>
                    <div class="flex items-center gap-4 pl-3 flex-shrink-0">
                        <button onclick="toggleEdit(${idx})" class="text-weddingGreen/50 hover:text-weddingGold" title="Editar"><i class="fa-solid fa-pen text-xs"></i></button>
                        <button onclick="toggleFam(${idx})" class="text-weddingGold"><i id="fam-ic-${idx}" class="fa-solid fa-chevron-up transition-transform"></i></button>
                    </div>
                </div>
                <div id="fam-${idx}" class="border-t border-weddingGold/10">
                    <div id="vista-${idx}" class="divide-y divide-weddingGold/5">${filas}</div>
                    <div id="edicion-${idx}" class="hidden p-4 grid grid-cols-2 gap-3 bg-weddingGreenLight/10">${formularioEdicion(x)}</div>
                </div>
            </div>`;
        }

        function formularioEdicion(x) {
            var f = x.fila;
            return campoEdit("Nombre", f, "nombre", x.nombre, "text", "col-span-2")
                + campoEdit("¿Asiste?", f, "asiste", x.asiste, "select")
                + campoEdit("Nº asistentes (adultos)", f, "personas", x.personas, "number")
                + campoEdit("Acompañantes", f, "acompanantes", x.acompanantes, "text", "col-span-2")
                + campoEdit("Niños (menú)", f, "ninos", x.ninos, "number")
                + campoEdit("Bebés (tronas)", f, "bebes", x.bebes, "number")
                + campoEdit("Alergias por comensal", f, "alergias", x.alergias, "textarea", "col-span-2")
                + campoEdit("Comentarios", f, "comentarios", x.comentarios, "textarea", "col-span-2");
        }

        function campoEdit(label, fila, campo, valor, tipo, span) {
            tipo = tipo || "text";
            span = span || "";
            var base = 'data-fila="' + fila + '" data-campo="' + campo + '" onchange="guardarCampo(this)" class="w-full bg-white border border-weddingGold/30 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-weddingGreen/30 focus:border-weddingGreen"';
            var control;
            if (tipo === "select") {
                control = '<select ' + base + '>'
                    + '<option value="si"' + (String(valor) === "si" ? " selected" : "") + '>Sí</option>'
                    + '<option value="no"' + (String(valor) === "no" ? " selected" : "") + '>No</option>'
                    + '</select>';
            } else if (tipo === "textarea") {
                control = '<textarea rows="2" ' + base + '>' + esc(valor) + '</textarea>';
            } else {
                control = '<input type="' + tipo + '" value="' + escAttr(valor) + '" ' + base + '>';
            }
            return '<label class="block ' + span + '"><span class="block text-[9px] uppercase tracking-wider text-weddingGreen font-semibold mb-1">' + label + '</span>' + control + '</label>';
        }

        function escAttr(v) { return esc(v).replace(/"/g, "&quot;"); }

        function toggleEdit(idx) {
            document.getElementById("fam-" + idx).classList.remove("hidden");
            document.getElementById("fam-ic-" + idx).classList.remove("rotate-180");
            const edit = document.getElementById("edicion-" + idx);
            const oculto = edit.classList.toggle("hidden");
            document.getElementById("vista-" + idx).classList.toggle("hidden", !oculto);
        }

        function guardarCampo(el) {
            const clave = sessionStorage.getItem("panelClave");
            fetch(APPS_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ tipo: "editar", clave: clave, fila: el.dataset.fila, campo: el.dataset.campo, valor: el.value })
            }).catch(() => {});
            el.classList.add("ring-2", "ring-green-400");
            setTimeout(() => el.classList.remove("ring-2", "ring-green-400"), 1000);
        }

        function postPanel(payload) {
            payload.clave = sessionStorage.getItem("panelClave");
            return fetch(APPS_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            }).catch(() => {});
        }

        function guardarCancion(el) {
            postPanel({ tipo: "editarCancion", id: el.dataset.id, campo: el.dataset.campo, valor: el.value });
            el.classList.add("ring-2", "ring-green-400");
            setTimeout(() => el.classList.remove("ring-2", "ring-green-400"), 1000);
        }

        function borrarCancion(id, btn) {
            if (!confirm("¿Borrar esta canción de la lista?")) return;
            postPanel({ tipo: "borrarCancion", id: id });
            const tr = btn.closest("tr");
            tr.style.opacity = "0.4";
            setTimeout(() => cargar(false), 600);
        }

        function anadirCancion() {
            const titulo = document.getElementById("nueva-titulo").value.trim();
            const artista = document.getElementById("nueva-artista").value.trim();
            const proponente = document.getElementById("nueva-proponente").value.trim();
            if (!titulo) { document.getElementById("nueva-titulo").focus(); return; }
            postPanel({ tipo: "cancion", titulo: titulo, artista: artista, proponente: proponente || "Novios" });
            document.getElementById("nueva-titulo").value = "";
            document.getElementById("nueva-artista").value = "";
            document.getElementById("nueva-proponente").value = "";
            setTimeout(() => cargar(false), 700);
        }

        function toggleFam(idx) {
            const cont = document.getElementById("fam-" + idx);
            const ic = document.getElementById("fam-ic-" + idx);
            const oculto = cont.classList.toggle("hidden");
            ic.classList.toggle("rotate-180", oculto);
        }

        function toggleTodas() {
            const btn = document.getElementById("toggle-todas");
            const colapsar = btn.dataset.estado !== "colapsado";
            document.querySelectorAll('[id^="fam-"]').forEach(el => {
                if (el.id.indexOf("fam-ic-") === 0) {
                    el.classList.toggle("rotate-180", colapsar);
                } else {
                    el.classList.toggle("hidden", colapsar);
                }
            });
            btn.dataset.estado = colapsar ? "colapsado" : "expandido";
            btn.innerHTML = colapsar
                ? '<i class="fa-solid fa-chevron-down mr-1"></i> Expandir todo'
                : '<i class="fa-solid fa-chevron-up mr-1"></i> Colapsar todo';
        }

        function pintar(data) {
            const rsvp = data.rsvp || [];
            // Calculamos el resumen en el cliente: asistentes = adultos totales + niños.
            let respuestas = rsvp.length, asistenSi = 0, asistenNo = 0, adultos = 0, ninos = 0, bebes = 0;
            rsvp.forEach(x => {
                if (String(x.asiste) === "si") {
                    asistenSi++;
                    adultos += Number(x.personas) || 0;
                    ninos += Number(x.ninos) || 0;
                    bebes += Number(x.bebes) || 0;
                } else if (String(x.asiste) === "no") { asistenNo++; }
            });
            const asistentes = adultos + ninos;

            document.getElementById("resumen").innerHTML =
                tarjeta(respuestas, "Respuestas", "fa-solid fa-list-check", "text-weddingGreen") +
                tarjeta(asistenSi, "Familias que asisten", "fa-solid fa-circle-check", "text-green-600") +
                tarjeta(asistenNo, "No asisten", "fa-solid fa-circle-xmark", "text-red-500") +
                tarjeta(adultos, "Adultos (menú adulto)", "fa-solid fa-user", "text-weddingGold") +
                tarjeta(ninos, "Niños (menú infantil)", "fa-solid fa-child", "text-weddingGold") +
                tarjeta(asistentes, "Total comensales (adultos+niños)", "fa-solid fa-users", "text-weddingGreen") +
                tarjeta(bebes, "Bebés (tronas)", "fa-solid fa-baby", "text-weddingGold");

            // Listado plegable por familia, con una línea por persona.
            const rb = document.getElementById("rsvp-body");
            if (!rsvp.length) {
                rb.innerHTML = `<div class="bg-white/60 border border-weddingGold/15 rounded-2xl px-4 py-6 text-center text-weddingDark/50">Aún no hay confirmaciones.</div>`;
            } else {
                rb.innerHTML = rsvp.map((x, idx) => familiaBloque(x, idx)).join("");
            }

            const pb = document.getElementById("playlist-body");
            const songs = (data.canciones||[]).slice().sort((a,b)=>b.votos-a.votos);
            const inp = (id,campo,valor,extra) => `<input value="${escAttr(valor)}" data-id="${esc(id)}" data-campo="${campo}" onchange="guardarCancion(this)" class="w-full bg-transparent border border-transparent hover:border-weddingGold/30 focus:border-weddingGreen focus:bg-white rounded px-2 py-1 text-xs focus:outline-none ${extra||''}">`;
            pb.innerHTML = songs.map((s,i) => `
                <tr class="hover:bg-weddingGreenLight/20">
                    <td class="px-3 py-2 text-weddingDark/50">${i+1}</td>
                    <td class="px-2 py-1">${inp(s.id,"titulo",s.titulo,"font-semibold text-weddingGreen")}</td>
                    <td class="px-2 py-1">${inp(s.id,"artista",s.artista)}</td>
                    <td class="px-2 py-1">${inp(s.id,"proponente",s.proponente,"text-weddingDark/70")}</td>
                    <td class="px-2 py-1 w-16"><input type="number" value="${escAttr(s.votos)}" data-id="${esc(s.id)}" data-campo="votos" onchange="guardarCancion(this)" class="w-14 bg-transparent border border-transparent hover:border-weddingGold/30 focus:border-weddingGreen focus:bg-white rounded px-2 py-1 text-xs text-center font-semibold text-weddingGold focus:outline-none"></td>
                    <td class="px-3 py-2 text-center"><button onclick="borrarCancion('${esc(s.id)}', this)" class="text-red-400 hover:text-red-600" title="Borrar"><i class="fa-solid fa-trash text-xs"></i></button></td>
                </tr>`).join("") || `<tr><td colspan="6" class="px-3 py-6 text-center text-weddingDark/50">Aún no hay sugerencias.</td></tr>`;

            document.getElementById("estado").textContent = "Actualizado: " + new Date().toLocaleString("es-ES");
        }

        function esc(v) {
            return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        }

        function exportarCSV() {
            if (!DATA) return;
            const cols = ["fecha","nombre","asiste","personas","acompanantes","ninos","bebes","alergias","comentarios"];
            const cab = ["Fecha","Nombre","Asiste","Nº asistentes","Acompañantes","Niños","Bebés","Alergias","Comentarios"];
            let csv = cab.join(";") + "\n";
            (DATA.rsvp||[]).forEach(x => {
                csv += cols.map(c => '"' + String(x[c]==null?"":x[c]).replace(/"/g,'""') + '"').join(";") + "\n";
            });
            const blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8;"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "confirmaciones-boda.csv";
            a.click();
        }

        // Si ya hay clave en la sesión, entra directo.
        if (sessionStorage.getItem("panelClave")) cargar(false);
    </script>
</body>
</html>
